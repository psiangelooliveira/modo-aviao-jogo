    :root { --primary: #a78bfa; --bg: #0c0c14; }

    .btn-restart { padding:12px 24px; background:#ffd166; color: #111; border:0; border-radius:8px; font-weight:bold; cursor:pointer; width: 100%; box-sizing: border-box; margin-bottom: 20px; }

    #splashScreen { position: fixed; inset: 0; z-index: 9500; display: flex; align-items: center; justify-content: center; overflow: hidden; width: 390px; height: 780px; margin: auto; background: #000; transform-origin: center center; }
    #splashBg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; opacity: 0; animation: videoFadeIn 2s ease forwards; }
    @keyframes videoFadeIn { to { opacity: 1; } }

<script>
const audioSplash = new Audio('https://psiangelooliveira.com.br/wp-content/uploads/2026/04/Money-for-nothing-Dire-Straits.mp3');
const audioGame = new Audio('https://psiangelooliveira.com.br/wp-content/uploads/2026/04/Monrey-Pink-Floyd.mp3');
audioGame.loop = true;
const audioEnd = new Audio('https://psiangelooliveira.com.br/wp-content/uploads/2026/04/Pecado-capital-Paulinho-da-Viola.mp3');
const audioMamonas = new Audio('https://psiangelooliveira.com.br/wp-content/uploads/2026/04/1406-Mamonas.mp3');
audioMamonas.loop = true;

let soundEnabled = false;
let gameStarted = false;
let audioChoiceSelected = null;
let typeIntervals = [];
let clocksVisited = 0;

setTimeout(() => {
    document.getElementById('curtain').style.display = 'none';
    document.getElementById('viewport').style.visibility = 'visible';
}, 2000);

function setDailyBlock() {
    const tomorrow = new Date();
    tomorrow.setHours(23, 59, 59, 999);
    localStorage.setItem('nextPlayTime', tomorrow.getTime());
}

function isBlocked() {
    const nextPlay = localStorage.getItem('nextPlayTime');
    if (nextPlay && Date.now() < parseInt(nextPlay)) {
        return true;
    }
    if (nextPlay && Date.now() >= parseInt(nextPlay)) {
        localStorage.removeItem('nextPlayTime');
        return false;
    }
    return false;
}

function typeHTML(element, htmlString, speed, callback) {
    element.innerHTML = '';
    let i = 0;
    let isTag = false;
    let currentHTML = '';
    
    typeIntervals.forEach(clearInterval);
    typeIntervals = [];

    const intervalId = setInterval(() => {
        if (i < htmlString.length) {
            currentHTML += htmlString.charAt(i);
            element.innerHTML = currentHTML;
            if (htmlString.charAt(i) === '<') isTag = true;
            if (htmlString.charAt(i) === '>') isTag = false;
            i++;
            if(isTag) {
                while(i < htmlString.length && htmlString.charAt(i-1) !== '>') {
                    currentHTML += htmlString.charAt(i);
                    element.innerHTML = currentHTML;
                    i++;
                }
                isTag = false;
            }
        } else {
            clearInterval(intervalId);
            if (callback) callback();
        }
    }, speed);
    typeIntervals.push(intervalId);
}

function init() {

            const div = document.createElement('div');

            div.style.left = r.x + 'px'; div.style.top = r.y + 'px'; div.style.width = r.w + 'px'; div.style.height = r.h + 'px';
            if (index === 0) div.textContent = (parseInt(id) >= 10) ? '' : c.idName;
            world.appendChild(div);
        });
    });
    setInterval(update, 30);
    updateTimerUI();
    ajustarEscala();
}

function updateTimerUI() {
    const tEl = document.getElementById('timer');
    let m = Math.floor(Math.max(totalTime, 0)/60), s = Math.max(totalTime, 0)%60;
    tEl.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function startTimer() {
    const interval = setInterval(() => {
        if(!gameStarted) return;
        if(isAction) return;
        totalTime--;
        updateTimerUI();
        if(totalTime <= 0) { clearInterval(interval); triggerGameOver(false, false); }
    }, 1000);
}

function isWalkable(x, y) {
    for (let z of walkableZones) {
        if (x >= z.x && x <= z.x + z.w && y >= z.y && y <= z.y + z.h) return true;
    }
    for (let id in cards) {
        for (let r of cards[id].rects) {
            if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) return true;
        }
    }
    return false;
}

function update() {
    if(!gameStarted) return;
    if(isAction) return;
    let nextX = pX;
    let nextY = pY;

    if(moveDir==='up') nextY -= 6;
    if(moveDir==='down') nextY += 6;
    if(moveDir==='left') nextX -= 6;
    if(moveDir==='right') nextX += 6;

    if(nextY < 10) nextY = 10;
    if(nextY > 760) nextY = 760;
    if(nextX < 10) nextX = 10;
    if(nextX > 1160) nextX = 1160;
    if(isWalkable(nextX, nextY)) {
        pX = nextX;
        pY = nextY;
    }

    const player = document.getElementById('player');
    player.style.left = pX + 'px'; 
    player.style.top = pY + 'px';
    const currentFrame = Math.floor(pX / 390);
    document.getElementById('world').style.left = `-${currentFrame * 390}px`;
    const pRect = { x: pX - 25, y: pY - 25, w: 50, h: 50 };
    Object.keys(cards).forEach(id => {
        if(done[id]) return;
        const hit = cards[id].rects.some(r => {
            return pRect.x < r.x + r.w && pRect.x + pRect.w > r.x && pRect.y < r.y + r.h && pRect.y + pRect.h > r.y;
        });
        if (hit) openTask(id);
    });
}

function completeTask(id) {
    done[id] = true;
    updateProgress();
    markTaskCompleted(id);
    
    isAction = false;
    const fezBonus = (done[10] && done[1] && done[3] && done[8]);
    const fezPadrao = (Object.keys(done).filter(k => k < 10 && k != 10).length === 9);
    
    if (fezPadrao || fezBonus) {
        triggerGameOver(true, fezBonus);
    } else if (totalTime <= 0) {
        triggerGameOver(false, false);
    }
}

function updateProgress() {
    const count = Object.keys(done).filter(k => k < 10).length;
    document.getElementById('taskCount').textContent = count + '/9';
    document.getElementById('progressBar').style.width = (count / 9 * 100) + '%';
}

function startMove(dir) { moveDir = dir; }
function stopMove() { moveDir = null; }

function triggerGameOver(win, fezBonus) {
    isAction = true; 
    stopAudio(audioGame);
    if(soundEnabled) { audioEnd.play().catch(e=>console.log(e)); }

    const transitionScreen = document.getElementById('transitionScreen');
    const transIcon = document.getElementById('transIcon');
    const transTitle = document.getElementById('transTitle');
    const countdownEl = document.getElementById('countdown');
    
    if (win) {
        transIcon.textContent = '✔';
        transIcon.className = 'transition-icon icon-win';
        transTitle.textContent = 'Meta alcançada';
    } else {
        transIcon.textContent = '✖';
        transIcon.className = 'transition-icon icon-lose';
        transTitle.textContent = 'Game over';
    }

    transitionScreen.style.display = 'flex';
    let count = 3;
    countdownEl.textContent = count;
    const interval = setInterval(() => {
        count--;
        if(count > 0) {
            countdownEl.textContent = count;
        } else {
            clearInterval(interval);
            transitionScreen.style.display = 'none';
            showFinalResult(win, fezBonus);
        }
    }, 1000);
}

function ajustarEscala() {
    const largura = window.innerWidth;
    const altura = window.innerHeight;
    const escala = Math.min(largura / 390, altura / 780);
    const telas = ['viewport', 'splashScreen', 'introScreen'];
    telas.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.transform = `scale(${escala})`;
    });
}

window.addEventListener('resize', ajustarEscala);
init();
