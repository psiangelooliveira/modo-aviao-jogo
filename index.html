<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Modo avião: agência em alerta</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
    :root { --primary: #a78bfa; --bg: #0c0c14; }
    body { margin:0; background:#000; display:flex; align-items:center; justify-content:center; width: 100vw; height:100vh; height:100dvh; overflow:hidden; font-family:Arial, sans-serif; touch-action: none; }
    
    #viewport { width:390px; height:780px; overflow:hidden; position:relative; background:var(--bg); border:2px solid #333; transform-origin: center center; }
    #world { width:1170px; height:780px; position:absolute; left:-390px; top:0; transition: left 0.3s ease; }
    .frame { width:390px; height:780px; position:relative; float:left; }
    .frame .bg { width:390px; height:780px; display:block; object-fit:cover; pointer-events: none; }

    #header { position:absolute; top:0; left:0; width:100%; height:80px; background:rgba(0,0,0,0.8); z-index:1000; padding:10px; box-sizing:border-box; color:#fff; border-bottom: 2px solid #333; }
    .status-row { display:flex; justify-content:space-between; font-size:14px; margin-bottom:8px; font-weight:bold; }
    #progressBarContainer { width:100%; height:12px; background:#222; border-radius:6px; overflow:hidden; }
    #progressBar { width:0%; height:100%; background:var(--primary); transition: width 0.3s; }

    #player { position:absolute; width:60px; height:60px; pointer-events:none; object-fit: contain; z-index:2500; transform:translate(-50%, -50%); }

    #controls { position:absolute; bottom:90px; left:50%; transform:translateX(-50%); display:grid; grid-template-columns: repeat(3, 65px); gap:10px; z-index:2000; }
    .btn { width:65px; height:65px; background:rgba(255,255,255,0.2); border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-size:28px; user-select:none; cursor: pointer; border: 1px solid rgba(255,255,255,0.3); backdrop-filter: blur(4px); }
    .btn:active { background:rgba(255,255,255,0.5); }

    .zone { display: none !important; }

    #modalOverlay { position:fixed; inset:0; background:rgba(0,0,0,0.85); display:none; align-items:center; justify-content:center; z-index:3000; opacity:0; transition: opacity 0.3s ease; }
    #modalOverlay.show { display:flex; opacity:1; }
    
    .flip-container { perspective: 1000px; width: 320px; min-height: 240px; transform: scale(0.9); transition: transform 0.3s ease; }
    #modalOverlay.show .flip-container { transform: scale(1); }
    .flip-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
    .flip-inner.flipped { transform: rotateY(180deg); }
    
    .flip-front, .flip-back { width: 100%; min-height: 240px; backface-visibility: hidden; background: #17172b; border: 1px solid var(--primary); border-radius: 14px; padding: 20px; box-sizing: border-box; position: absolute; top: 0; left: 0; display: flex; flex-direction: column; justify-content: center; }
    .flip-front { z-index: 2; }
    .flip-back { transform: rotateY(180deg); }

    .modal-content { display:flex; gap:15px; margin-bottom:15px; align-items:center; }
    .npc-face { width:65px; height:65px; background:#333; border:2px solid var(--primary); flex-shrink:0; border-radius: 8px; overflow:hidden; }
    .npc-face img { width:100%; height:100%; object-fit:cover; display:block; }
    #execBarContainer { width:100%; height:12px; background:#222; border-radius:6px; margin-top:15px; display:none; overflow:hidden; }
    #execBar { width:0%; height:100%; background:#ffd166; border-radius:6px; transition: width 0.1s linear; }

    .btn-acao { display:none; width:100%; padding:12px; margin-top:15px; border-radius:8px; border:none; font-weight:bold; cursor:pointer; font-size:14px; }
    #btnDica { background: var(--primary); color: #fff; }
    #btnFechar { background: #ffd166; color: #111; }

    #successCheck { position:fixed; inset:0; background:rgba(0,0,0,0.6); display:none; align-items:center; justify-content:center; z-index:4000; }
    .check-circle { width:100px; height:100px; background:lime; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:60px; color:white; animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; transform: scale(0); }
    @keyframes pop { to { transform: scale(1); } }
    
    #transitionScreen { position:fixed; inset:0; background:rgba(0,0,0,0.85); display:none; align-items:center; justify-content:center; flex-direction:column; z-index:4500; color:#fff; text-align:center; }
    .countdown { font-size: 80px; font-weight: bold; color: var(--primary); margin-top: 20px; animation: pulse 1s infinite; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }
    
    #end { position:fixed; inset:0; background:var(--bg); display:none; align-items:center; justify-content:center; flex-direction:column; z-index:5000; color:#fff; text-align:center; padding:20px; overflow-y:auto; }
    #endTxt { font-size: 15px; line-height: 1.6; margin-bottom: 20px; max-width: 320px; }
    .btn-download { display: inline-block; background: var(--primary); color: #fff; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-bottom: 15px; width: 100%; box-sizing: border-box; cursor: pointer; font-size: 14px; border: none; }
    .btn-restart { padding:12px 24px; background:#ffd166; color: #111; border:0; border-radius:8px; font-weight:bold; cursor:pointer; width: 100%; box-sizing: border-box; margin-bottom: 20px; }

    #splashScreen { position: fixed; inset: 0; z-index: 9500; display: flex; align-items: center; justify-content: center; overflow: hidden; width: 390px; height: 780px; margin: auto; background: #000; transform-origin: center center; }
    #splashBg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
    #splashContent { position: relative; z-index: 1; text-align: center; opacity: 0; transform: translateY(16px); animation: introFadeIn 1s ease 0.5s forwards; }
    #splashContent h1 { font-family: 'Press Start 2P', monospace; font-size: 26px; color: #fff; text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; margin: 0 0 15px 0; line-height: 1.4; }
    #splashContent h2 { font-family: 'Press Start 2P', monospace; font-size: 16px; color: #fff; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; margin: 0 0 40px 0; }
    #btnSplashComecar { background: var(--primary); color: #fff; border: none; border-radius: 8px; padding: 15px 0; width: 200px; font-size: 14px; font-weight: bold; font-family: 'Press Start 2P', monospace; cursor: pointer; transition: opacity 0.2s; box-shadow: 2px 2px 0 #000; }
    #btnSplashComecar:active { opacity: 0.8; transform: scale(0.95); }
    #splashScreen.hide { opacity: 0; transition: opacity 0.6s ease; pointer-events: none; }

    #introScreen { position: fixed; inset: 0; z-index: 9000; display: none; align-items: center; justify-content: center; overflow: hidden; width: 390px; height: 780px; margin: auto; transform-origin: center center; }
    #introBg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
    #introBox { position: relative; z-index: 1; background: rgba(23, 23, 43, 0.4); border: 1px solid var(--primary); border-radius: 14px; padding: 28px 24px; max-width: 320px; width: 90%; text-align: center; box-sizing: border-box; opacity: 0; transform: translateY(16px); animation: introFadeIn 0.8s ease 0.5s forwards; }
    @keyframes introFadeIn { to { opacity: 1; transform: translateY(0); } }
    #introBox p { font-size: 15px; color: #cfcfe8; line-height: 1.7; margin: 0 0 24px 0; min-height: 130px; }
    #introBox p b { color: #fff; }
    #btnComecar { background: var(--primary); color: #fff; border: none; border-radius: 8px; padding: 13px 0; width: 100%; font-size: 15px; font-weight: bold; cursor: pointer; letter-spacing: 1px; transition: opacity 0.2s; }
    #btnComecar:active { opacity: 0.8; }
    #introScreen.hide { opacity: 0; transition: opacity 0.6s ease; pointer-events: none; }
</style>
</head>
<body>

<div id="splashScreen">
    <video id="splashBg" autoplay muted loop playsinline>
        <source src="https://psiangelooliveira.com.br/wp-content/uploads/2026/04/iniciar-jogo.mp4" type="video/mp4">
    </video>
    <div id="splashContent">
        <h1>5º dia<br>útil</h1>
        <h2>O jogo</h2>
        <button id="btnSplashComecar">COMEÇAR</button>
    </div>
</div>

<div id="introScreen">
    <video id="introBg" autoplay muted loop playsinline>
        <source src="https://psiangelooliveira.com.br/wp-content/uploads/2026/04/Intro-angelo.mp4" type="video/mp4">
    </video>
    <div id="introBox">
        <p id="introText"></p>
        <button id="btnComecar">COMEÇAR</button>
    </div>
</div>

<div id="viewport">
    <div id="header">
        <div class="status-row">
            <span>Tempo: <b id="timer">02:30</b></span>
            <span>Tarefas: <b id="taskCount">0/9</b></span>
        </div>
        <div id="progressBarContainer"><div id="progressBar"></div></div>
    </div>

    <div id="world">
        <div class="frame">
            <video class="bg" autoplay muted loop playsinline>
                <source src="https://psiangelooliveira.com.br/wp-content/uploads/2026/04/tela-1.mp4" type="video/mp4">
            </video>
        </div>
        <div class="frame">
            <video class="bg" autoplay muted loop playsinline>
                <source src="https://psiangelooliveira.com.br/wp-content/uploads/2026/04/tela-2.mp4" type="video/mp4">
            </video>
        </div>
        <div class="frame">
            <video class="bg" autoplay muted loop playsinline>
                <source src="https://psiangelooliveira.com.br/wp-content/uploads/2026/04/tela-3.mp4" type="video/mp4">
            </video>
        </div>
        
        <img id="player" src="https://psiangelooliveira.com.br/wp-content/uploads/2026/04/Logo_Psi_Angelo_11_opcao_2-1.png">
    </div>

    <div id="controls">
        <div></div><div class="btn" onmousedown="startMove('up')" ontouchstart="startMove('up')">▲</div><div></div>
        <div class="btn" onmousedown="startMove('left')" ontouchstart="startMove('left')">◀</div>
        <div class="btn" onmousedown="startMove('down')" ontouchstart="startMove('down')">▼</div>
        <div class="btn" onmousedown="startMove('right')" ontouchstart="startMove('right')">▶</div>
    </div>
</div>

<div id="modalOverlay">
    <div class="flip-container">
        <div class="flip-inner" id="flipInner">
            <div class="flip-front">
                <div class="modal-content">
                    <div class="npc-face" id="npcFace"></div>
                    <div>
                        <h3 id="mTitle" style="margin:0; font-size:17px; color:#fff;"></h3>
                        <p id="mDesc" style="font-size:13px; color:#cfcfe8; margin-top:6px; line-height:1.4;"></p>
                    </div>
                </div>
                <div id="execBarContainer"><div id="execBar"></div></div>
                <button class="btn-acao" id="btnDica" onclick="flipCard()">Dica</button>
            </div>
            
            <div class="flip-back">
                <div id="typed" style="font-size:13px; background:#10101d; padding:14px; border-radius:8px; border: 1px solid #333; line-height:1.5; color:#cfcfe8; flex-grow:1;"></div>
                <button class="btn-acao" id="btnFechar" onclick="closeAndCheck()">Continuar</button>
            </div>
        </div>
    </div>
</div>

<div id="successCheck"><div class="check-circle">✔</div></div>

<div id="transitionScreen">
    <h2>Game over</h2>
    <p>Vamos ver seu resultado?</p>
    <div class="countdown" id="countdown">3</div>
</div>

<div id="end">
    <div id="endTxt"></div>
    <div id="endButtons" style="width: 100%; max-width: 320px;"></div>
</div>

<script>
const walkableZones = [
    {x: 0, y: 0, w: 1170, h: 220}, 
    {x: 0, y: 220, w: 50, h: 360}, 
    {x: 140, y: 380, w: 300, h: 70}, 
    {x: 140, y: 450, w: 200, h: 150}, 
    {x: 320, y: 600, w: 120, h: 180}, 
    {x: 440, y: 650, w: 320, h: 130}, 
    {x: 530, y: 380, w: 140, h: 270}, 
    {x: 340, y: 330, w: 280, h: 110}, 
    {x: 760, y: 380, w: 180, h: 400}, 
    {x: 870, y: 330, w: 200, h: 50},  
    {x: 1060, y: 220, w: 110, h: 560} 
];

const cards = {
    1: { idName: 'VAL', type: 'red', t:'Validar proposta', d:'Val está esperando com uma proposta na mão.', typed:'No ambiente bancário, adiar decisões aumenta o estresse por antecipação. Responder agora reduz a carga cognitiva acumulada.', rects: [{x: 670, y: 470, w: 90, h: 180}], img:'https://psiangelooliveira.com.br/wp-content/uploads/2026/04/Val.png' },
    2: { idName: 'ALINE', type: 'red', t:'Autorizar compra', d:'Aline aguarda autorização.', typed:'Delegar tarefas não urgentes libera energia mental para o que realmente importa agora. Não fazer microgerenciamentos permite performar melhor.', rects: [{x: 440, y: 450, w: 90, h: 200}], img:'https://psiangelooliveira.com.br/wp-content/uploads/2026/04/Aline.png' },
    3: { idName: 'DIONEI', type: 'red', t:'Assinar documento', d:'Dionei precisa da assinatura.', typed:'Urgências reais exigem ação imediata. Reconhecer isso sem culpa é parte do autogerenciamento eficaz.', rects: [{x: 620, y: 200, w: 80, h: 180}], img:'https://psiangelooliveira.com.br/wp-content/uploads/2026/04/Dionei.png' },
    4: { idName: 'GINA', type: 'red', t:'Atender telefone', d:'Gina espera atendimento.', typed:'Interrupções constantes fragmentam a atenção. Aprender a priorizar qual chamada requer você é uma habilidade executiva.', rects: [{x: 50, y: 300, w: 90, h: 280}], img:'https://psiangelooliveira.com.br/wp-content/uploads/2026/04/Gina.png' },
    5: { idName: 'BRUNO', type: 'red', t:'Responder e-mail', d:'Bruno digita no PC.', typed:'E-mails internos raramente são emergências. Estabelecer janelas de resposta reduz a ansiedade de disponibilidade constante.', rects: [{x: 180, y: 600, w: 140, h: 180}], img:'https://psiangelooliveira.com.br/wp-content/uploads/2026/04/Bruno.png' },
    6: { idName: 'MARI', type: 'red', t:'Liberar acesso', d:'Mari aguarda liberação.', typed:'Processos burocráticos geram frustração quando fogem do nosso controle. Focar no que é possível resolver reduz o desgaste emocional.', rects: [{x: 140, y: 160, w: 130, h: 180},{x: 140, y: 340, w: 70, h: 100}], img:'https://psiangelooliveira.com.br/wp-content/uploads/2026/04/Mari.png' },
    7: { idName: 'LORENZA', type: 'red', t:'Ajudar cliente', d:'Lorenza quer falar com o gerente.', typed:'Situações com clientes emocionalmente carregados ativam respostas automáticas de defesa. A TCC ensina a responder, não reagir.', rects: [{x: 940, y: 380, w: 120, h: 180}], img:'https://psiangelooliveira.com.br/wp-content/uploads/2026/04/Lorenza.png' },
    8: { idName: 'NAYARA', type: 'red', t:'Resolver reclamação', d:'Nayara pede ajuda.', typed:'Ameaças de clientes ativam o sistema de ameaça. Respirar antes de responder não é fraqueza - é regulação emocional.', rects: [{x: 740, y: 160, w: 90, h: 220}], img:'https://psiangelooliveira.com.br/wp-content/uploads/2026/04/Nayara.png' },
    9: { idName: 'STEPHANIE', type: 'red', t:'Fechar relatório', d:'Stephanie fecha o relatório.', typed:'Fechamentos de ciclo (relatórios, metas) têm papel importante na sensação de controle e conclusão do dia de trabalho.', rects: [{x: 830, y: 160, w: 110, h: 170}], img:'https://psiangelooliveira.com.br/wp-content/uploads/2026/04/Stephanie.png' },
    10:{ idName: 'Cronograma', type: 'red', t:'Cronograma', d:'Carregando seu planejamento do dia.', typed:'', rects: [{x: 480, y: 230, w: 100, h: 100}], img:'https://psiangelooliveira.com.br/wp-content/uploads/2026/04/Logo_Psi_Angelo_11_opcao_2-1.png' },
    
    11: { idName: 'X1', type: 'green', t:'Pausa para a água', d:'Você parou no bebedouro.', typed:'Beber água não é só sobre saúde física. Sabia que ela controla o nível de cortisol, melhora o humor e, claro, pode ser aquela pausa que evita decisões precipitadas. Como você não se esqueceu disso, ganhou +10 segundos de bônus', rects: [{x: 1090, y: 160, w: 80, h: 90}], img:'https://psiangelooliveira.com.br/wp-content/uploads/2026/04/Logo_Psi_Angelo_11_opcao_2-1.png' },
    12: { idName: 'X1', type: 'green', t:'Reflexão importante', d:'Uma reflexão sobre a rotina de clientes.', typed:'Sabe aquele cliente que sempre nos pede a mesma coisa e realizamos pra ele a mesma tarefa? Que tal o desafio de abordá-lo diferente da próxima vez? Muitas vezes, pequenas mudanças na rotina podem desencadear novas oportunidades. Explore isso.', rects: [{x: 1070, y: 540, w: 100, h: 70}], img:'https://psiangelooliveira.com.br/wp-content/uploads/2026/04/Logo_Psi_Angelo_11_opcao_2-1.png' },
    13: { idName: 'X2', type: 'green', t:'Convite ao check up', d:'Um lembrete importante para a sua saúde.', typed:'Já que chegou até aqui, me diz uma coisa: Quando fez seu último check up? Se tem mais de um ano, é hora de refazê-lo. Afinal, é impossível pensar em equilíbrio emocional se o corpo não estiver saudável. Lembre-se disso!', rects: [{x: 0, y: 580, w: 50, h: 60}], img:'https://psiangelooliveira.com.br/wp-content/uploads/2026/04/Logo_Psi_Angelo_11_opcao_2-1.png' },
    14: { idName: 'X3', type: 'green', t:'Pausa para a água', d:'Você parou no bebedouro.', typed:'Beber água não é só sobre saúde física. Sabia que ela controla o nível de cortisol, melhora o humor e, claro, pode ser aquela pausa que evita decisões precipitadas. Como você não se esqueceu disso, ganhou +10 segundos de bônus', rects: [{x: 395, y: 240, w: 50, h: 90}], img:'https://psiangelooliveira.com.br/wp-content/uploads/2026/04/Logo_Psi_Angelo_11_opcao_2-1.png' },
    15: { idName: 'X4', type: 'green', t:'Checklist do atraso', d:'Uma reflexão sobre tarefas.', typed:'Todo mundo tem uma ou outra tarefa que faz apenas porque quer se livrar dela rápida. Mas como ela é recorrente, sempre retorna. Então, pra essa semana, que tal escolher apenas 1 e excluir pra sempre do seu dia?', rects: [{x: 880, y: 650, w: 80, h: 80}], img:'https://psiangelooliveira.com.br/wp-content/uploads/2026/04/Logo_Psi_Angelo_11_opcao_2-1.png' },
    16: { idName: 'X5', type: 'green', t:'Memória no futuro', d:'Você encontrou os arquivos antigos.', typed:'Veio olhar os arquivos? Pois eu tenho um dica pra você guardar uma memória incrível. Já pensou em escrever um e-mail pro seu EU no futuro e receber na data escolhida? Pois esse bônus estará liberado pra você no fim do jogo. Aproveite!', rects: [{x: 40, y: 160, w: 100, h: 80}], img:'https://psiangelooliveira.com.br/wp-content/uploads/2026/04/Logo_Psi_Angelo_11_opcao_2-1.png' },
    17: { idName: 'X6', type: 'green', t:'Sobre o tempo', d:'Você olhou para o relógio.', typed:'Já que olhou pro relógio, te convido a refletir sobre o tempo. A pergunta é: Você tem o mesmo rigor de horários para entrar e sair do trabalho? É pontual nas tarefas e no intervalo de almoço? Dedica atenção exclusiva tanto pra concluir um serviço no prazo quanto pra ver um filme completo? Pois isso também é equilíbrio, não concorda?', rects: [{x: 520, y: 70, w: 60, h: 60}], img:'https://psiangelooliveira.com.br/wp-content/uploads/2026/04/Logo_Psi_Angelo_11_opcao_2-1.png' }
};
let pX = 585; 
let pY = 720; 
let moveDir = null;
let done = {}, totalTime = 150, isAction = false;
let currentTaskId = null;
let hasFutureEmail = false;
let gameStarted = false;

window.addEventListener('mouseup', stopMove);
window.addEventListener('touchend', stopMove);

document.getElementById('btnSplashComecar').addEventListener('click', function() {
    const splashScreen = document.getElementById('splashScreen');
    const introScreen = document.getElementById('introScreen');
    
    introScreen.style.display = 'flex';
    splashScreen.classList.add('hide');
    
    setTimeout(() => {
        splashScreen.style.display = 'none';
        setTimeout(typeWriterIntro, 800);
    }, 600);
});

document.getElementById('btnComecar').addEventListener('click', function() {
    const introScreen = document.getElementById('introScreen');
    introScreen.classList.add('hide');
    setTimeout(() => {
        introScreen.style.display = 'none';
        gameStarted = true;
    }, 600);
});

function init() {
    const world = document.getElementById('world');
    Object.keys(cards).forEach(id => {
        const c = cards[id];
        c.rects.forEach((r, index) => {
            const div = document.createElement('div');
            div.className = `zone ${c.type}`;
            div.id = 'zone' + id + '_' + index;
            div.style.left = r.x + 'px'; div.style.top = r.y + 'px'; div.style.width = r.w + 'px'; div.style.height = r.h + 'px';
            if (index === 0) div.textContent = (c.idName === 'Cronograma' || parseInt(id) > 10) ? '' : c.idName;
            world.appendChild(div);
        });
    });
    setInterval(update, 30);
    startTimer();
    ajustarEscala();
}

function startTimer() {
    const tEl = document.getElementById('timer');
    const interval = setInterval(() => {
        if(!gameStarted) return;
        if(isAction) return;
        totalTime--;
        let m = Math.floor(totalTime/60), s = totalTime%60;
        tEl.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        if(totalTime <= 0) { clearInterval(interval); triggerGameOver(false, false); }
    }, 1000);
}

function isWalkable(x, y) {
    for (let z of walkableZones) {
        if (x >= z.x && x <= z.x + z.w && y >= z.y && y <= z.y + z.h) return true;
    }
    for (let id in cards) {
        for (let r of cards[id].rects) {
            if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) return true;
        }
    }
    return false;
}

function update() {
    if(!gameStarted) return;
    if(isAction) return;
    let nextX = pX;
    let nextY = pY;

    if(moveDir==='up') nextY -= 6;
    if(moveDir==='down') nextY += 6;
    if(moveDir==='left') nextX -= 6;
    if(moveDir==='right') nextX += 6;

    if(nextY < 10) nextY = 10;
    if(nextY > 760) nextY = 760;
    if(nextX < 10) nextX = 10;
    if(nextX > 1160) nextX = 1160;
    if(isWalkable(nextX, nextY)) {
        pX = nextX;
        pY = nextY;
    }

    const player = document.getElementById('player');
    player.style.left = pX + 'px'; 
    player.style.top = pY + 'px';
    const currentFrame = Math.floor(pX / 390);
    document.getElementById('world').style.left = `-${currentFrame * 390}px`;
    const pRect = { x: pX - 25, y: pY - 25, w: 50, h: 50 };
    Object.keys(cards).forEach(id => {
        if(done[id]) return;
        const hit = cards[id].rects.some(r => {
            return pRect.x < r.x + r.w && pRect.x + pRect.w > r.x && pRect.y < r.y + r.h && pRect.y + pRect.h > r.y;
        });
        if (hit) openTask(id);
    });
}

function openTask(id) {
    isAction = true;
    stopMove();
    currentTaskId = id;
    const c = cards[id];
    if(id == 11 || id == 14) {
        totalTime += 10;
    }
    if(id == 16) {
        hasFutureEmail = true;
    }
    
    const mo = document.getElementById('modalOverlay');
    const flipInner = document.getElementById('flipInner');
    const btnDica = document.getElementById('btnDica');
    const btnFechar = document.getElementById('btnFechar');
    const faceContainer = document.getElementById('npcFace');
    const execBarContainer = document.getElementById('execBarContainer');
    const eBar = document.getElementById('execBar');
    
    flipInner.classList.remove('flipped');
    btnDica.style.display = 'none';
    btnFechar.style.display = 'none';
    
    if(c.img) {
        faceContainer.innerHTML = `<img src="${c.img}">`;
        faceContainer.style.display = 'block';
    } else {
        faceContainer.style.display = 'none';
    }

    document.getElementById('mTitle').textContent = c.t;
    document.getElementById('mDesc').textContent = c.d;

    mo.style.display = 'flex';
    setTimeout(() => { mo.classList.add('show'); }, 10);
    
    execBarContainer.style.display = 'block';
    eBar.style.width = '0%';
    let progress = 0;
    const interval = setInterval(() => {
        progress += 1;
        eBar.style.width = progress + '%';
        if(progress >= 100) {
            clearInterval(interval);
            btnDica.style.display = 'block';
        }
    }, 80);
}

function flipCard() {
    const flipInner = document.getElementById('flipInner');
    flipInner.classList.add('flipped');
    
    const id = currentTaskId;
    const c = cards[id];
    let textToType = c.typed;

    if(id == 10) {
        if(Object.keys(done).filter(k => k < 10).length === 0) {
            textToType = "Você checou o cronograma primeiro. Isso é planejamento! E para te mostrar o quanto você foi inteligente, as tarefas sem maior prioridade já estão nas mãos de quem irá executar. Tempo otimizado, cuide agora do essencial!";
            [2, 4, 5, 6, 7, 9].forEach(taskId => {
                done[taskId] = true;
            });
            updateProgress();
        } else {
            textToType = "É bom ter passado aqui, mas atente-se de que sua primeira atividade do dia seja sempre conferir o cronograma. Se você não organizar o seu dia, tudo se torna urgente. E quando tudo é urgente, você pode não conseguir solucionar corretamente e causar estresse desnecessário.";
        }
    }
    
    document.getElementById('typed').innerHTML = textToType;
    document.getElementById('btnFechar').style.display = 'block';
}

function closeAndCheck() {
    const mo = document.getElementById('modalOverlay');
    mo.classList.remove('show');
    setTimeout(() => {
        mo.style.display = 'none';
        document.getElementById('execBarContainer').style.display = 'none';
        showSuccessCheck(currentTaskId);
    }, 300);
}

function showSuccessCheck(id) {
    const checkEl = document.getElementById('successCheck');
    checkEl.style.display = 'flex';
    setTimeout(() => {
        checkEl.style.display = 'none';
        completeTask(id);
    }, 1500);
}

function completeTask(id) {
    done[id] = true;
    updateProgress();
    
    isAction = false;
    const fezBonus = (done[10] && done[1] && done[3] && done[8]);
    const fezPadrao = (Object.keys(done).filter(k => k < 10 && k != 10).length === 9);
    if (fezPadrao || fezBonus) {
        triggerGameOver(true, fezBonus);
    }
}

function updateProgress() {
    const count = Object.keys(done).filter(k => k < 10).length;
    document.getElementById('taskCount').textContent = count + '/9';
    document.getElementById('progressBar').style.width = (count / 9 * 100) + '%';
}

function startMove(dir) { moveDir = dir; }
function stopMove() { moveDir = null; }

function triggerGameOver(win, fezBonus) {
    isAction = true; 
    const transitionScreen = document.getElementById('transitionScreen');
    const countdownEl = document.getElementById('countdown');
    
    transitionScreen.style.display = 'flex';
    let count = 3;
    countdownEl.textContent = count;
    const interval = setInterval(() => {
        count--;
        if(count > 0) {
            countdownEl.textContent = count;
        } else {
            clearInterval(interval);
            transitionScreen.style.display = 'none';
            showFinalResult(win, fezBonus);
        }
    }, 1000);
}

function showFinalResult(win, fezBonus) {
    const end = document.getElementById('end');
    const endTxt = document.getElementById('endTxt');
    const endButtons = document.getElementById('endButtons');
    end.style.display = 'flex';
    
    let mensagem = "";
    
    if (win) {
        if (fezBonus) {
            mensagem = "Você trabalhou no modo turbo e priorizou o que era urgente. Sabe o nome disso? Estratégia. E mesmo que não seja possível aplicá-la todo dia, tê-la como bússola é a melhor orientação para quem quer alta performance.<br><br>Gostou do jogo? Aqui tem um mimo pra você se cuidar ainda mais!";
        } else {
            mensagem = "Você equilibrou urgência e andamento sem travar o dia. A dica pra constância é: Antes de começar, saiba a prioridade de cada tarefa.<br><br>Gostou do jogo? Aqui tem um mimo pra você se cuidar ainda mais!";
        }
        if(!done[10]) {
            mensagem += "<br><br><b>Atenção:</b> Você não foi à sua mesa em nenhum momento. Se você não organizar o seu dia, tudo se torna urgente e gera stress desnecessário.<br><br>Mas como executou tudo, aqui tem um mimo que pode te ajudar a planejar seu dia de modo estratégico.";
        }
    } else {
        mensagem = "O tempo acabou! É hora de repensar a estratégia.<br><br>Tem dias que a gente não dá conta de tudo. E isso não é problema se você mantém um planejamento constante. E sabe a melhor forma de fazer isso? Tire um tempo no final do dia para anotar onde pode melhorar. Descanse.<br><br>E amanhã recomece. Temos uma surpresa bacana te esperando quando vier jogar novamente.";
    }
    
    endTxt.innerHTML = mensagem;

    let btnFutureHtml = hasFutureEmail ?
        `<a href="https://www.futureme.org/" target="_blank" class="btn-download" style="background:#34c759; margin-bottom:15px;">E-mail pro futuro</a>` : '';
    if (fezBonus) {
        endButtons.innerHTML = `
            <button id="btnDownloadEasterEgg" class="btn-download">Baixar eBook</button>
            ${btnFutureHtml}
            <button onclick="location.reload()" class="btn-restart">Tentar novamente</button>
        `;
        document.getElementById('btnDownloadEasterEgg').addEventListener('click', triggerEasterEgg);
    } else {
        endButtons.innerHTML = `
            <a href="https://psiangelooliveira.com.br/wp-content/uploads/2026/04/GTD_ebook_posiangelooliveira.com_.br_.pdf" target="_blank" class="btn-download">Baixar eBook</a>
            ${btnFutureHtml}
            <button onclick="location.reload()" class="btn-restart">Tentar novamente</button>
        `;
    }
}

function triggerEasterEgg() {
    const endTxt = document.getElementById('endTxt');
    const endButtons = document.getElementById('endButtons');
    endTxt.innerHTML = `
        <b style="font-size:18px; color:var(--primary);">Opa! Mas que pressa é essa!</b><br><br>
        Espera só um pouquinho que você tem um monte de coisas extras por ter executado o jogo no modo mais estratégico possível. Não conta pra ninguém mas todo mundo que conseguir fazer o mesmo, não tem um mimo só, mas sim 3.<br><br>
        Aqui estão eles. Aproveite!
    `;

    endButtons.innerHTML = `
        <a href="https://psiangelooliveira.com.br/wp-content/uploads/2026/04/GTD_ebook_posiangelooliveira.com_.br_.pdf" target="_blank" class="btn-download">Baixar eBook</a>
        <a href="https://psiangelooliveira.com.br/dicas" target="_blank" class="btn-download" style="background:#7c3aed;">Dicas exclusivas</a>
        <a href="https://neal.fun/perfect-circle/" target="_blank" class="btn-download" style="background:#0ea5e9;">Fora do óbvio</a>
        <a href="https://www.youtube.com/watch?v=MGKZuasYCaM" target="_blank" class="btn-download" style="background:#ef4444;">Mensagem do Ângelo</a>
        <button onclick="location.reload()" class="btn-restart">Tentar novamente</button>
    `;
}

// Função para calcular o zoom proporcional da tela mantendo o layout do jogo
function ajustarEscala() {
    const largura = window.innerWidth;
    const altura = window.innerHeight;
    const escala = Math.min(largura / 390, altura / 780);
    
    const telas = ['viewport', 'splashScreen', 'introScreen'];
    telas.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.transform = `scale(${escala})`;
    });
}

window.addEventListener('resize', ajustarEscala);

init();

const introStr = "É hora do dia mais cheio em uma agência.<br><br>E você só precisa navegar pelo banco e executar as tarefas.<br><br>Mas lembre-se: <b>É por onde começa que dita seu ritmo.</b>";
const introP = document.getElementById('introText');
let typeIdx = 0;
let typeHtml = '';
let isHtmlTag = false;
function typeWriterIntro() {
    if (typeIdx < introStr.length) {
        typeHtml += introStr.charAt(typeIdx);
        introP.innerHTML = typeHtml;
        if (introStr.charAt(typeIdx) === '<') isHtmlTag = true;
        if (introStr.charAt(typeIdx) === '>') isHtmlTag = false;
        typeIdx++;
        setTimeout(typeWriterIntro, isHtmlTag ? 0 : 30);
    }
}
